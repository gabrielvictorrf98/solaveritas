---
layout: default
---

<article>
  <div class="container">
    {%- if page.title and page.url != "/" -%}
    <header class="article-header">
      <h1>{{ page.title }}</h1>
      {%- if page.subtitle -%}
        <p class="subtitle">{{ page.subtitle }}</p>
      {%- endif -%}
    </header>
    {%- endif -%}

    <div class="article-content">
      {{ content }}
    </div>
  </div>
</article>
